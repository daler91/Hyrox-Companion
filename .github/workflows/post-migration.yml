name: Post-Migration Verification

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify Railway + Neon Migration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run post-migration tests against Neon
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          ENCRYPTION_KEY: "01234567890123456789012345678901"
        run: pnpm vitest run --config vitest.integration.config.ts server/routes/tests/post-migration.integration.test.ts
