name: Cypress Tests

on: [push]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hyrox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i

      - name: Build application
        run: pnpm run build

      - name: Run migrations
        run: pnpm run db:migrate
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/hyrox_test

      - name: Start server
        run: NODE_ENV=development node dist/index.js &
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/hyrox_test
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          ALLOW_DEV_AUTH_BYPASS: 'true'
          PORT: 5000
          ENCRYPTION_KEY: "01234567890123456789012345678901"

      - name: Wait for server
        run: npx wait-on http-get://localhost:5000/api/v1/health --timeout 120000

      - name: Cypress run
        uses: cypress-io/github-action@82482149c343a5dee155d22104111b9319f9dd45 # v7
        with:
          record: true
          parallel: true
          install: true
          install-command: pnpm i
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          ALLOW_DEV_AUTH_BYPASS: 'true'
          PORT: 5000
