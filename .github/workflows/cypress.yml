name: Cypress Tests

on: [push]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-cypress-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-cypress-

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm i
          npx cypress install

      - name: Cache Cypress binary
        id: cypress-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Cypress binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: npx cypress install && node script/patch-cypress-deps.js

      - name: Build application
        run: pnpm run build

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run Integration Tests
        run: |
          export ALLOW_DEV_AUTH_BYPASS="true"
          export NODE_ENV="test"
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/postgres"
          npx drizzle-kit push
          pnpm exec vitest run --config vitest.integration.config.ts

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Run Smoke Test
        run: pnpm exec vitest run --config vitest.integration.config.ts server/routes/tests/smoke.integration.test.ts
        env:
          ALLOW_DEV_AUTH_BYPASS: "true"
          NODE_ENV: test
          DATABASE_URL: ${{ env.DATABASE_URL }}
          ENCRYPTION_KEY: "01234567890123456789012345678901"
          SESSION_SECRET: "dummy_session_secret_for_ci"

      - name: Start server
        run: NODE_ENV=test node dist/index.js &
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          PORT: 5000
          ENCRYPTION_KEY: "01234567890123456789012345678901"
          ALLOW_DEV_AUTH_BYPASS: "true"

      - name: Wait for server
        run: npx wait-on http-get://localhost:5000/api/v1/health --timeout 120000

      - name: Cypress run
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          record: true
          parallel: true
          install: false
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          PORT: 5000
