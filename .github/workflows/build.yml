name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm eslint .
      - name: TypeScript
        run: pnpm tsc --noEmit
      - name: OpenAPI snapshot is up-to-date
        run: |
          pnpm docs:openapi
          git diff --exit-code docs/openapi.json || {
            echo "::error file=docs/openapi.json::docs/openapi.json is stale. Run 'pnpm docs:openapi' locally and commit the result." >&2
            exit 1
          }

