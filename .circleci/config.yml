version: 2.1

orbs:
  cypress: cypress-io/cypress@3

jobs:
  test:
    docker:
      - image: cypress/browsers:latest
    environment:
      PORT: "5000"
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
            - ~/.cache/Cypress
      - run:
          name: Build application
          command: npm run build
      - run:
          name: Start server
          command: npm start
          background: true
      - run:
          name: Wait for server
          command: npx wait-on http://localhost:5000 --timeout 60000
      - run:
          name: Run Cypress tests
          command: npx cypress run --record --key $CYPRESS_RECORD_KEY
      - store_artifacts:
          path: cypress/screenshots
      - store_artifacts:
          path: cypress/videos

workflows:
  test:
    jobs:
      - test
