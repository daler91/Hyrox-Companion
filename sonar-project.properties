sonar.projectKey=daler91_Hyrox-Companion
sonar.organization=daler91

sonar.sources=client/src,server,shared
sonar.exclusions=migrations/**,migrations/**/*,migrations/*.sql,**/*.sql
# Global exclusions apply to PR analysis too, which scans changed files
# regardless of the `sonar.sources` setting. Without this, Drizzle-generated
# SQL migrations get picked up by the PL/SQL analyzer and flagged with
# Oracle-specific rules like "Use VARCHAR2 instead of VARCHAR" that don't
# apply to PostgreSQL.
sonar.global.exclusions=migrations/**,**/*.sql
sonar.tests=client/src/hooks/__tests__,server/routes/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.plsql.file.suffixes=.pls
